<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <style>
      .step { opacity: 0; }
      .step1 { animation: fadeIn 0.8s ease forwards 0.5s; }
      .step2 { animation: fadeIn 0.8s ease forwards 2s; }
      .step3 { animation: fadeIn 0.8s ease forwards 3.5s; }
      .step4 { animation: fadeIn 0.8s ease forwards 5s; }
      .step5 { animation: fadeIn 0.8s ease forwards 6.5s; }
      .arrow1 { opacity: 0; animation: fadeIn 0.4s ease forwards 1.5s; }
      .arrow2 { opacity: 0; animation: fadeIn 0.4s ease forwards 3s; }
      .arrow3 { opacity: 0; animation: fadeIn 0.4s ease forwards 4.5s; }
      .arrow4 { opacity: 0; animation: fadeIn 0.4s ease forwards 6s; }
      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
      .blink { animation: pulse 1.5s infinite 8s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="#1a2332"/>

  <!-- Step 1: CDN Failure -->
  <g class="step step1">
    <rect x="20" y="50" width="130" height="100" rx="8" fill="#e74c3c" opacity="0.9"/>
    <text x="85" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="600">❌ CDN</text>
    <text x="85" y="108" text-anchor="middle" fill="white" font-size="11" font-weight="600">FAILURE</text>
    <text x="85" y="132" text-anchor="middle" fill="#ffcccc" font-size="9">Cloudflare down</text>
  </g>

  <!-- Arrow 1 -->
  <g class="arrow1">
    <line x1="155" y1="100" x2="185" y2="100" stroke="#ff9900" stroke-width="2.5" stroke-dasharray="4,2"/>
    <polygon points="185,95 195,100 185,105" fill="#ff9900"/>
  </g>

  <!-- Step 2: Decision Engine -->
  <g class="step step2">
    <rect x="200" y="50" width="130" height="100" rx="8" fill="#2d3e50" stroke="#ff9900" stroke-width="2"/>
    <text x="265" y="85" text-anchor="middle" fill="#ff9900" font-size="11" font-weight="700">🧠 DECISION</text>
    <text x="265" y="105" text-anchor="middle" fill="white" font-size="9">CDN ✗ Origin ✓</text>
    <text x="265" y="120" text-anchor="middle" fill="white" font-size="9">→ Edge-only fault</text>
    <text x="265" y="140" text-anchor="middle" fill="#aaa" font-size="8">Canary dual-path</text>
  </g>

  <!-- Arrow 2 -->
  <g class="arrow2">
    <line x1="335" y1="100" x2="365" y2="100" stroke="#ff9900" stroke-width="2.5" stroke-dasharray="4,2"/>
    <polygon points="365,95 375,100 365,105" fill="#ff9900"/>
  </g>

  <!-- Step 3: Route53 Switch -->
  <g class="step step3">
    <rect x="380" y="50" width="130" height="100" rx="8" fill="#2d3e50" stroke="#3498db" stroke-width="2"/>
    <text x="445" y="85" text-anchor="middle" fill="#3498db" font-size="11" font-weight="700">🔄 SWITCH</text>
    <text x="445" y="105" text-anchor="middle" fill="white" font-size="9">Route53 → ALB</text>
    <text x="445" y="120" text-anchor="middle" fill="white" font-size="9">WAF → BLOCK</text>
    <text x="445" y="135" text-anchor="middle" fill="white" font-size="9">Emergency SG ✓</text>
    <text x="445" y="150" text-anchor="middle" fill="#aaa" font-size="8">~45 seconds</text>
  </g>

  <!-- Arrow 3 -->
  <g class="arrow3">
    <line x1="515" y1="100" x2="545" y2="100" stroke="#ff9900" stroke-width="2.5" stroke-dasharray="4,2"/>
    <polygon points="545,95 555,100 545,105" fill="#ff9900"/>
  </g>

  <!-- Step 4: Validate -->
  <g class="step step4">
    <rect x="560" y="50" width="100" height="100" rx="8" fill="#2d3e50" stroke="#9b59b6" stroke-width="2"/>
    <text x="610" y="85" text-anchor="middle" fill="#9b59b6" font-size="11" font-weight="700">🔍 VALIDATE</text>
    <text x="610" y="105" text-anchor="middle" fill="white" font-size="9">DNS resolve</text>
    <text x="610" y="120" text-anchor="middle" fill="white" font-size="9">Health check</text>
    <text x="610" y="140" text-anchor="middle" fill="#aaa" font-size="8">auto-rollback</text>
  </g>

  <!-- Arrow 4 -->
  <g class="arrow4">
    <line x1="665" y1="100" x2="695" y2="100" stroke="#27ae60" stroke-width="2.5"/>
    <polygon points="695,95 705,100 695,105" fill="#27ae60"/>
  </g>

  <!-- Step 5: Service OK -->
  <g class="step step5 blink">
    <rect x="710" y="50" width="70" height="100" rx="8" fill="#27ae60"/>
    <text x="745" y="92" text-anchor="middle" fill="white" font-size="13" font-weight="700">✅</text>
    <text x="745" y="112" text-anchor="middle" fill="white" font-size="11" font-weight="600">OK</text>
    <text x="745" y="132" text-anchor="middle" fill="#c8f7dc" font-size="9">< 3 min</text>
  </g>

  <!-- Timeline bar -->
  <rect x="20" y="170" width="760" height="4" rx="2" fill="#333"/>
  <rect x="20" y="170" width="760" height="4" rx="2" fill="#ff9900" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="7s" fill="freeze"/>
    <animate attributeName="width" from="0" to="760" dur="7s" fill="freeze"/>
  </rect>
  <text x="400" y="192" text-anchor="middle" fill="#888" font-size="10">Total elapsed: ~3 minutes</text>
</svg>
